name: "Test"
on:
  push:
    branches:
    - master
  pull_request:
    types: [assigned, opened, synchronize, reopened, labeled]
env:
  MIN_NODE_VERSION: &min_node_version "12"
  NPM_CONFIG_AUDIT: "false"
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: "lts/*"
    - name: "Install dependencies"
      run: npm install
    - name: "Lint sources"
      run: npm run lint:sources -- --max-warnings 0
    - name: "Lint types"
      run: npm run lint:types
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [*min_node_version, "lts/*"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node_version }}
    - name: "Use npm 8 on Node 12"
      if: ${{ matrix.node_version == '12' }}
      run: npm install -g npm@8
    - name: "Install dependencies"
      run: npm install
    - name: "Test sources"
      run: npm run test:sources
    - name: "Test types"
      run: npm run test:types
  bench:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: "lts/*"
    - name: "Install dependencies"
      run: npm install
    - name: "Run benchmark"
      run: npm run bench
  conformance:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PROTOBUF_UPSTREAM_VERSION: "v34.1"
      PROTOBUF_UPSTREAM: "tests/conformance/upstream"
      PROTOBUF_RUNNER_CACHE: "tests/conformance/runner-cache"
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: "lts/*"
    - name: "Prepare conformance runner cache"
      run: mkdir -p "$PROTOBUF_RUNNER_CACHE"
    - uses: actions/cache@v5
      id: conformance-runner-cache
      with:
        path: ${{ env.PROTOBUF_RUNNER_CACHE }}
        key: protobuf-conformance-runner-${{ runner.os }}-${{ env.PROTOBUF_UPSTREAM_VERSION }}-v2
    - name: "Install dependencies"
      run: npm install --ignore-scripts
    - name: "Install CLI dependencies"
      run: npm --prefix cli install --ignore-scripts
    - name: "Check out upstream protobuf"
      run: git clone --depth 1 --branch "$PROTOBUF_UPSTREAM_VERSION" https://github.com/protocolbuffers/protobuf.git "$PROTOBUF_UPSTREAM"
    - name: "Install build dependencies"
      if: steps.conformance-runner-cache.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build
    - name: "Build upstream conformance runner"
      if: steps.conformance-runner-cache.outputs.cache-hit != 'true'
      run: |
        cmake -S "$PROTOBUF_UPSTREAM" -B "$RUNNER_TEMP/protobuf-build" -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -Dprotobuf_BUILD_CONFORMANCE=ON \
          -Dprotobuf_BUILD_TESTS=OFF \
          -Dprotobuf_BUILD_EXAMPLES=OFF \
          -Dprotobuf_INSTALL=OFF \
          -Dprotobuf_FORCE_FETCH_DEPENDENCIES=ON
        cmake --build "$RUNNER_TEMP/protobuf-build" --target conformance_test_runner --parallel 2
        cp "$RUNNER_TEMP/protobuf-build/conformance_test_runner" "$PROTOBUF_RUNNER_CACHE/conformance_test_runner"
    - name: "Generate protobuf.js conformance target"
      run: node tests/conformance/generate.js
    - name: "Locate Node.js"
      id: node
      run: echo "path=$(command -v node)" >> "$GITHUB_OUTPUT"
    - name: "List conformance tests"
      run: |
        mkdir -p tests/conformance/out
        : > tests/conformance/out/failure_list.txt
        CONFORMANCE_LIST_TESTS=1 "$PROTOBUF_RUNNER_CACHE/conformance_test_runner" \
          --maximum_edition 2024 \
          --enforce_recommended \
          --verbose \
          --failure_list tests/conformance/out/failure_list.txt \
          --text_format_failure_list tests/conformance/text_format_failure_list.txt \
          --output_dir tests/conformance/out \
          "${{ steps.node.outputs.path }}" tests/conformance/runner.js \
          > tests/conformance/out/conformance-tests.log 2>&1
    - name: "Run conformance suite"
      id: conformance
      run: |
        set +e
        "$PROTOBUF_RUNNER_CACHE/conformance_test_runner" \
          --maximum_edition 2024 \
          --enforce_recommended \
          --failure_list tests/conformance/out/failure_list.txt \
          --text_format_failure_list tests/conformance/text_format_failure_list.txt \
          --output_dir tests/conformance/out \
          "${{ steps.node.outputs.path }}" tests/conformance/runner.js \
          > tests/conformance/out/conformance.log 2>&1
        status=$?
        set -e
        echo "exit_code=$status" >> "$GITHUB_OUTPUT"
        tail -n 80 tests/conformance/out/conformance.log
        if [ -s tests/conformance/out/failing_tests.txt ]; then
          echo ""
          echo "Failing conformance tests:"
          cat tests/conformance/out/failing_tests.txt
        fi
    - name: "Summarize conformance results"
      if: always()
      run: node tests/conformance/report.js tests/conformance/out/conformance.log tests/conformance/out/conformance-tests.log | tee -a "$GITHUB_STEP_SUMMARY"
